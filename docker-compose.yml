####
# Coolify deployment: pulls the pre-built image from GHCR.
#
# Image is published by .github/workflows/docker.yml on every push to main.
# Coolify reads this compose file, pulls the image, wires its reverse proxy
# (Traefik) to the EXPOSE'd port (7777), and manages the TLS cert.
#
# To build/run locally instead of pulling, comment out `image:` and uncomment
# the `build:` block below.
####
services:
  sentinel:
    image: ghcr.io/situmorang-com/security-auditing-tools:latest
    # build:
    #   context: .
    #   dockerfile: Dockerfile
    pull_policy: always
    restart: unless-stopped
    environment:
      SENTINEL_MODE: ${SENTINEL_MODE:-showcase}
      SENTINEL_BIND: 0.0.0.0:7777
      SENTINEL_STATIC_DIR: /app/dist
      RUST_LOG: ${RUST_LOG:-info,tower_http=warn}
    expose:
      - "7777"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:7777/api/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
